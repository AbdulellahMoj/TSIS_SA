<?xml version="1.0" encoding="utf-8"?>
<!-- TSIS_SA header (text-free): split green/blue animated banner with particles and em-dash glyphs -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 140" width="900" height="140" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="gLeft" x1="0" x2="1">
      <stop offset="0%" stop-color="#0fb26a" />
      <stop offset="100%" stop-color="#067a3d" />
    </linearGradient>
    <linearGradient id="gRight" x1="0" x2="1">
      <stop offset="0%" stop-color="#0a66c2" />
      <stop offset="100%" stop-color="#2aa0ff" />
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feBlend in="SourceGraphic" in2="b" mode="screen"/>
    </filter>
  </defs>
  <style>
    .panel { rx: 14; }
    .left { fill: url(#gLeft); }
    .right { fill: url(#gRight); }
    .dash { fill: #fff; opacity: .9; }
    .dash-soft { fill: #fff; opacity: .18; filter: url(#soft);} 
    .dot { fill: rgba(255,255,255,0.95); }
    .particle { mix-blend-mode: screen; }
    .line { stroke: rgba(255,255,255,0.18); stroke-width:1.4; stroke-linecap:round; }

    /* animations */
    .spin-slow { transform-origin: 70px 70px; animation: spin 18s linear infinite; }
    .float-slow { animation: float 6s ease-in-out infinite; }
    .drift { animation: drift 14s linear infinite; }
    .pulse { animation: pulse 2.4s ease-in-out infinite; }

    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes float { 0%{transform:translateY(0)}50%{transform:translateY(-6px)}100%{transform:translateY(0)} }
    @keyframes drift { 0%{transform:translateX(0)}50%{transform:translateX(8px)}100%{transform:translateX(0)} }
    @keyframes pulse { 0%{opacity:.95}50%{opacity:.45}100%{opacity:.95} }
  </style>

  <!-- base rounded background split left/right -->
  <rect x="6" y="6" width="888" height="128" rx="14" fill="#0b1226" />
  <g clip-path="url(#clip)">
    <rect x="6" y="6" width="444" height="128" rx="14" class="left" />
    <rect x="450" y="6" width="444" height="128" rx="14" class="right" />
  </g>

  <!-- subtle connecting lines (center) -->
  <g transform="translate(140,70)" stroke-linejoin="round">
    <polyline class="line" points="0,-8 60,-24 140,-10 220,-20 300,0" style="opacity:.12; stroke-dasharray:6 6;" />
    <polyline class="line drift" points="0,10 80,30 160,8 240,20 320,2" style="opacity:.10; stroke-dasharray:8 8;" />
  </g>

  <!-- animated particles across banner -->
  <g id="particles" class="particle">
    <circle class="dot pulse" cx="80" cy="40" r="3" fill="#ffffff" style="animation-delay:0s" />
    <circle class="dot" cx="180" cy="70" r="2.4" fill="#dfffe6" style="animation:float 5s ease-in-out infinite; animation-delay:.2s" />
    <circle class="dot" cx="260" cy="36" r="2.8" fill="#e6fff1" style="animation:float 6.2s ease-in-out infinite; animation-delay:.6s" />
    <circle class="dot" cx="360" cy="92" r="2.6" fill="#bff7d6" style="animation:float 5.4s ease-in-out infinite; animation-delay:.9s" />
    <circle class="dot" cx="480" cy="52" r="3.6" fill="#cfe9ff" style="animation:float 5.8s ease-in-out infinite; animation-delay:1.1s" />
    <circle class="dot" cx="580" cy="86" r="2.2" fill="#a7d7ff" style="animation:float 6.6s ease-in-out infinite; animation-delay:1.3s" />
    <circle class="dot" cx="700" cy="34" r="3.2" fill="#eaf6ff" style="animation:float 5.0s ease-in-out infinite; animation-delay:1.6s" />
    <circle class="dot" cx="820" cy="68" r="2.8" fill="#d7f0ff" style="animation:float 6.8s ease-in-out infinite; animation-delay:2.0s" />
  </g>

  <!-- decorative em-dash glyphs (as small rotated bars) -->
  <g transform="translate(48,28)" opacity="0.95">
    <rect x="0" y="0" width="18" height="4" rx="2" class="dash-soft" transform="rotate(12 9 2)" />
    <rect x="28" y="14" width="22" height="4" rx="2" class="dash" transform="rotate(-6 39 16)" />
    <rect x="70" y="6" width="16" height="4" rx="2" class="dash-soft" transform="rotate(20 78 8)" />
  </g>

  <g transform="translate(520,42)" opacity="0.9">
    <rect x="0" y="0" width="20" height="4" rx="2" class="dash" transform="rotate(-10 10 2)" />
    <rect x="36" y="18" width="24" height="4" rx="2" class="dash-soft" transform="rotate(6 48 20)" />
    <rect x="72" y="6" width="18" height="4" rx="2" class="dash" transform="rotate(-14 81 8)" />
  </g>

  <!-- faint rounded frame overlay to match examples -->
  <rect x="6" y="6" width="888" height="128" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="6" />

</svg>
