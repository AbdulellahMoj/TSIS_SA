<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 140" width="900" height="140">
  <style>
    .bg { fill: #0b1226; }
    .ring { fill: none; stroke: #06b6d4; stroke-width: 6; stroke-linecap: round; opacity: .15; }
    .ring-anim { transform-origin: 70px 70px; animation: spin 12s linear infinite; }
    .title { font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; font-size: 36px; fill: #ffffff; font-weight:700; }
    .subtitle { font-size: 14px; fill: #cbd5e1; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    @keyframes spin { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }
    @keyframes pulse { 0% { opacity: 1 } 50% { opacity: .6 } 100% { opacity: 1 } }
    .letter { transition: transform .28s cubic-bezier(.2,.9,.3,1); }
    .letter:hover { transform: translateY(-6px) scale(1.02); }
  </style>

  <rect class="bg" x="0" y="0" width="900" height="140" rx="8"/>

  <!-- rotating rings on the left -->
  <g transform="translate(40,10)" class="ring-anim">
    <circle class="ring" cx="70" cy="60" r="50" />
    <circle class="ring" cx="70" cy="60" r="34" />
    <circle cx="70" cy="60" r="8" fill="#06b6d4" opacity="0.95" />
  </g>

  <!-- Title text -->
  <g transform="translate(150,48)">
    <text class="title" x="0" y="0">TSIS_SA</text>
    <text class="subtitle" x="0" y="30">Technical Students Internship Strategist — Saudi Edition</text>
  </g>

  <!-- animated dots -->
  <g transform="translate(620,30)">
    <circle cx="0" cy="10" r="6" fill="#06b6d4" class="pulse" style="animation-delay:0s" />
    <circle cx="28" cy="10" r="6" fill="#60a5fa" class="pulse" style="animation-delay:.15s" />
    <circle cx="56" cy="10" r="6" fill="#f59e0b" class="pulse" style="animation-delay:.3s" />
  </g>

  <!-- small tagline on right -->
  <g transform="translate(150,86)">
    <text class="subtitle" x="0" y="0">AI-powered pipeline: CV, Search, ATS, Outreach, Tracker</text>
  </g>

</svg>
